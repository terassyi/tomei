version: 2

builds:
  - main: ./cmd/tomei
    binary: tomei
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  # Use GitHub's native release notes generation to avoid previous_tag
  # misdetection caused by CUE module tags (tomei-cue-v*).
  use: github-native

release:
  github:
    owner: terassyi
    name: tomei
  draft: false
  prerelease: auto

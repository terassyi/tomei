name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run in dry-run mode (snapshot)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  ci:
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yaml

  check-ci:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow release.yaml \
            --branch "${{ github.ref_name }}" \
            --event push \
            --json conclusion \
            --jq '.[0].conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI has not passed for tag ${{ github.ref_name }} (status: ${CONCLUSION:-not found})"
            exit 1
          fi

  release:
    needs: [ci, check-ci]
    if: ${{ !cancelled() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') && (needs.check-ci.result == 'success' || needs.check-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: ./.github/actions/determine-version

      - name: Verify git tag exists
        if: github.event_name == 'workflow_dispatch' && !inputs.dry-run
        uses: ./.github/actions/verify-tag
        with:
          version: ${{ steps.version.outputs.version }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Compute previous release tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --list 'v*' --sort=v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -v current="$CURRENT_TAG" '$0 == current {print prev; exit} {prev=$0}')
          if [ -n "$PREV_TAG" ]; then
            echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "Computed previous release tag: $PREV_TAG"
          else
            echo "No previous release tag found (first release or non-release tag)"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: ${{ (github.event_name == 'push' || inputs.dry-run) && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev-tag.outputs.previous_tag }}
